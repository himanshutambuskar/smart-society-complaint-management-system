<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard — Society Portal</title>
  <link rel="stylesheet" href="/css/society-theme.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebarContainer"></div>

  <div class="main-content">
    <header class="top-header">
      <div style="display:flex;align-items:center;gap:var(--gap-md);">
        <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
        <div class="header-left">
          <h1>Staff Dashboard</h1>
          <div class="breadcrumb">Welcome, <span id="headerName">—</span></div>
        </div>
      </div>
      <div class="header-actions" style="position:relative;">
        <div class="notif-bell" id="notifBell" onclick="toggleNotifDropdown()">
          🔔 <span class="notif-badge" id="notifBadge"></span>
        </div>
        <div class="notif-dropdown" id="notifDropdown">
          <div class="notif-dropdown-header"><h4>Notifications</h4><span class="notif-read-all" onclick="notifications.markAllRead()">Mark all read</span></div>
          <div class="notif-list" id="notifList"></div>
        </div>
      </div>
    </header>

    <div class="page-body">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card maroon skeleton" style="height:100px;"></div>
        <div class="stat-card amber skeleton" style="height:100px;"></div>
        <div class="stat-card blue skeleton" style="height:100px;"></div>
        <div class="stat-card green skeleton" style="height:100px;"></div>
      </div>

      <div class="dashboard-grid">
        <div>
          <h2 class="section-title">🔧 Assigned Complaints</h2>
          <div id="assignedList">
            <div class="loading"><div class="spinner"></div></div>
          </div>
          <div style="text-align:right;margin-top:var(--gap-md);">
            <a href="/staff/complaints" class="btn btn-outline btn-sm">View All →</a>
          </div>
        </div>
        <div>
          <h2 class="section-title">👤 My Info</h2>
          <div class="card" id="staffCard">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container"></div>

<script src="/js/api.js"></script>
<script>
  (async () => {
    const user = await auth.requireAuth(['staff']);
    if (!user) return;
    document.getElementById('headerName').textContent = user.full_name.split(' ')[0];
    document.getElementById('sidebarContainer').innerHTML = sidebar.render('staff', user, '/staff/dashboard');
    await notifications.loadBell(document.getElementById('notifBell'), document.getElementById('notifBadge'), document.getElementById('notifDropdown'));
    await loadDashboard();
  })();

  async function loadDashboard() {
    const data = await api.get('/api/staff/dashboard');
    if (!data || !data.success) { toast.error('Failed to load dashboard.'); return; }
    const { stats, recent, profile } = data;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card maroon"><div class="stat-icon">📋</div><div><div class="stat-value">${stats.total||0}</div><div class="stat-label">Total Assigned</div></div></div>
      <div class="stat-card amber"><div class="stat-icon">⏳</div><div><div class="stat-value">${stats.pending||0}</div><div class="stat-label">Pending</div></div></div>
      <div class="stat-card blue"><div class="stat-icon">🔧</div><div><div class="stat-value">${stats.in_progress||0}</div><div class="stat-label">In Progress</div></div></div>
      <div class="stat-card green"><div class="stat-icon">✅</div><div><div class="stat-value">${stats.resolved_today||0}</div><div class="stat-label">Resolved Today</div></div></div>`;

    document.getElementById('assignedList').innerHTML = !recent.length
      ? `<div class="empty-state"><div class="empty-state-icon">🎉</div><h3>All clear!</h3><p>No complaints assigned to you currently.</p></div>`
      : recent.map(c => `
        <div class="complaint-slip priority-${c.priority} mb-sm" onclick="location.href='/staff/complaint/${c.complaint_id}'">
          <div class="slip-category">${categoryIcon(c.category)} ${capitalize(c.category)}</div>
          <div class="slip-title">${escHtml(c.title)}</div>
          <div style="font-size:12px;color:var(--charcoal-light);margin-bottom:4px;">Room ${escHtml(c.room_number||'—')} — ${escHtml(c.member_name)}</div>
          <div class="slip-footer"><span class="text-mono">#${c.complaint_id}</span>${statusBadge(c.status)}</div>
        </div>`).join('');

    document.getElementById('staffCard').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:12px;font-size:14px;">
        <div style="display:flex;justify-content:space-between;"><span class="text-muted">Name</span><strong>${escHtml(profile?.full_name||'—')}</strong></div>
        <div style="display:flex;justify-content:space-between;"><span class="text-muted">Department</span><strong>${capitalize(profile?.department||'—')}</strong></div>
        <div style="display:flex;justify-content:space-between;"><span class="text-muted">Shift</span><strong>${capitalize(profile?.shift||'—')}</strong></div>
        <div style="display:flex;justify-content:space-between;"><span class="text-muted">Role</span><span class="badge badge-role-staff">🔧 Staff</span></div>
      </div>`;
  }

  function toggleNotifDropdown() { document.getElementById('notifDropdown').classList.toggle('open'); }
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#notifBell') && !e.target.closest('#notifDropdown'))
      document.getElementById('notifDropdown')?.classList.remove('open');
  });
</script>
</body>
</html>
